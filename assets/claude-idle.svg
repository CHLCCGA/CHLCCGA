<svg xmlns="http://www.w3.org/2000/svg" width="90" height="130" viewBox="0 0 90 130">
  <g>
    <!-- Gentle sway -->
    <animateTransform attributeName="transform" type="translate"
                      values="0,0;1,0;0,0;-1,0;0,0"
                      keyTimes="0;0.25;0.5;0.75;1"
                      dur="3s" repeatCount="indefinite"/>
    <!-- Head: large, round, mascot proportions -->
    <rect x="10" y="4" width="70" height="64" rx="22" fill="#DA7756"/>
    <!-- Highlight -->
    <rect x="16" y="9" width="24" height="11" rx="6" fill="#E8896A" opacity="0.45"/>
    <!-- Face -->
    <rect x="18" y="13" width="54" height="46" rx="14" fill="#F9EDE4"/>
    <!-- Left eye -->
    <circle cx="33" cy="33" r="7" fill="#2D1810"/>
    <circle cx="35" cy="31" r="2.5" fill="white" opacity="0.55"/>
    <!-- Right eye -->
    <circle cx="57" cy="33" r="7" fill="#2D1810"/>
    <circle cx="59" cy="31" r="2.5" fill="white" opacity="0.55"/>
    <!-- Blink overlays -->
    <rect x="26" y="26" width="14" height="14" rx="4" fill="#F9EDE4" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.84;0.86;0.91;0.93;1" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="50" y="26" width="14" height="14" rx="4" fill="#F9EDE4" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.84;0.86;0.91;0.93;1" dur="4s" repeatCount="indefinite"/>
    </rect>
    <!-- Smile -->
    <path d="M30 47 Q45 57 60 47" stroke="#2D1810" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Body: compact, wide -->
    <rect x="18" y="70" width="54" height="32" rx="12" fill="#DA7756"/>
    <!-- Arms: short chunky stubs -->
    <rect x="2"  y="74" width="18" height="14" rx="7" fill="#C4644A"/>
    <rect x="70" y="74" width="18" height="14" rx="7" fill="#C4644A"/>
    <!-- Legs: short stubs -->
    <rect x="20" y="98" width="20" height="26" rx="8" fill="#C4644A"/>
    <rect x="50" y="98" width="20" height="26" rx="8" fill="#C4644A"/>
  </g>
</svg>
