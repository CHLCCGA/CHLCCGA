<svg xmlns="http://www.w3.org/2000/svg" width="800" height="210" viewBox="0 0 800 210">
  <defs>
    <!-- two identical rainbow cycles → seamless loop when gradient shifts by 230px -->
    <linearGradient id="hallo-rainbow" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="460" y2="0">
      <stop offset="0%"    stop-color="#ff0000"/>
      <stop offset="8.3%"  stop-color="#ff9900"/>
      <stop offset="16.6%" stop-color="#ffff00"/>
      <stop offset="25%"   stop-color="#00dd44"/>
      <stop offset="33.3%" stop-color="#0099ff"/>
      <stop offset="41.6%" stop-color="#bb00ff"/>
      <stop offset="50%"   stop-color="#ff0000"/>
      <stop offset="58.3%" stop-color="#ff9900"/>
      <stop offset="66.6%" stop-color="#ffff00"/>
      <stop offset="75%"   stop-color="#00dd44"/>
      <stop offset="83.3%" stop-color="#0099ff"/>
      <stop offset="91.6%" stop-color="#bb00ff"/>
      <stop offset="100%"  stop-color="#ff0000"/>
      <animateTransform attributeName="gradientTransform" type="translate"
                        values="0,0;-230,0"
                        dur="2s" repeatCount="indefinite" calcMode="linear"/>
    </linearGradient>
  </defs>
  <!-- background -->
  <rect width="800" height="210" rx="8" fill="#0D0D0D"/>
  <!-- border -->
  <rect x="1" y="1" width="798" height="208" rx="7" fill="none" stroke="#DA7756" stroke-width="1.5"/>

  <!-- title bar -->
  <line x1="8"   y1="14" x2="130" y2="14" stroke="#DA7756" stroke-width="1"/>
  <text x="135"  y="19" font-family="Courier New,Courier,monospace" font-size="11.5" fill="#DA7756" font-weight="bold">Xinyu Geng · PhD Researcher · AI Security</text>
  <line x1="435" y1="14" x2="792" y2="14" stroke="#DA7756" stroke-width="1"/>
  <line x1="1"   y1="26" x2="799" y2="26" stroke="#DA7756" stroke-width="0.7" opacity="0.35"/>

  <!-- vertical divider -->
  <line x1="460" y1="26" x2="460" y2="209" stroke="#DA7756" stroke-width="0.7" opacity="0.4"/>

  <!-- horizontal divider (right panel) -->
  <line x1="460" y1="118" x2="799" y2="118" stroke="#DA7756" stroke-width="0.6" opacity="0.35"/>

