<svg xmlns="http://www.w3.org/2000/svg" width="800" height="210" viewBox="0 0 800 210">
  <!-- background -->
  <rect width="800" height="210" rx="8" fill="#0D0D0D"/>
  <!-- border -->
  <rect x="1" y="1" width="798" height="208" rx="7" fill="none" stroke="#DA7756" stroke-width="1.5"/>

  <!-- title bar -->
  <line x1="8"   y1="14" x2="130" y2="14" stroke="#DA7756" stroke-width="1"/>
  <text x="135"  y="19" font-family="Courier New,Courier,monospace" font-size="11.5" fill="#DA7756" font-weight="bold">Xinyu Geng · PhD Researcher · AI Security</text>
  <line x1="435" y1="14" x2="792" y2="14" stroke="#DA7756" stroke-width="1"/>
  <line x1="1"   y1="26" x2="799" y2="26" stroke="#DA7756" stroke-width="0.7" opacity="0.35"/>

  <!-- vertical divider -->
  <line x1="460" y1="26" x2="460" y2="209" stroke="#DA7756" stroke-width="0.7" opacity="0.4"/>

  <!-- horizontal divider (right panel) -->
  <line x1="460" y1="118" x2="799" y2="118" stroke="#DA7756" stroke-width="0.6" opacity="0.35"/>

  <!-- ══════════ LEFT PANEL ══════════ -->
  <text x="230" y="52" text-anchor="middle"
        font-family="Courier New,Courier,monospace" font-size="13"
        fill="#E0E0E0" font-weight="bold">Welcome back, Xinyu!</text>

  <!-- whole dog: gentle side sway -->
  <g>
    <animateTransform attributeName="transform" type="translate"
                      values="0,0;1,0;0,0;-1,0;0,0"
                      keyTimes="0;0.25;0.5;0.75;1"
                      dur="3s" repeatCount="indefinite"/>
    <!-- floppy ears -->
    <rect x="182" y="66" width="14" height="32" fill="#CCCCCC"/>
    <rect x="264" y="66" width="14" height="32" fill="#CCCCCC"/>
    <!-- head -->
    <rect x="194" y="62" width="72" height="38" fill="#F2F2F2"/>
    <!-- left eye -->
    <rect x="208" y="74" width="12" height="12" fill="#444444"/>
    <rect x="210" y="75" width="4"  height="4"  fill="white" opacity="0.5"/>
    <!-- right eye -->
    <rect x="240" y="74" width="12" height="12" fill="#444444"/>
    <rect x="242" y="75" width="4"  height="4"  fill="white" opacity="0.5"/>
    <!-- blink: cover eyes with head color -->
    <rect x="208" y="74" width="12" height="12" fill="#F2F2F2" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.83;0.85;0.90;0.92;1" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="240" y="74" width="12" height="12" fill="#F2F2F2" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.83;0.85;0.90;0.92;1" dur="4s" repeatCount="indefinite"/>
    </rect>
    <!-- nose -->
    <rect x="225" y="89" width="10" height="8" fill="#444444"/>
    <!-- body -->
    <rect x="200" y="100" width="60" height="18" fill="#F2F2F2"/>
    <!-- legs -->
    <rect x="200" y="118" width="18" height="10" fill="#CCCCCC"/>
    <rect x="242" y="118" width="18" height="10" fill="#CCCCCC"/>
    <!-- wagging tail: rotates around base (262,108) -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
                        values="-30,262,108;0,262,108;30,262,108;0,262,108;-30,262,108"
                        keyTimes="0;0.25;0.5;0.75;1"
                        dur="0.7s" repeatCount="indefinite"/>
      <rect x="256" y="88" width="12" height="22" fill="#CCCCCC"/>
    </g>
  </g>
  <!-- links -->
  <text x="230" y="138" text-anchor="middle"
        font-family="Courier New,Courier,monospace" font-size="10.5" fill="#DA7756">shin-resume.vercel.app</text>
  <text x="230" y="155" text-anchor="middle"
        font-family="Courier New,Courier,monospace" font-size="10.5" fill="#6E6E6E">github.com/CHLCCGA</text>
  <text x="230" y="172" text-anchor="middle"
        font-family="Courier New,Courier,monospace" font-size="10.5" fill="#6E6E6E">linkedin.com/in/xinyu-geng</text>
  <text x="230" y="189" text-anchor="middle"
        font-family="Courier New,Courier,monospace" font-size="10.5" fill="#6E6E6E">AGH Krakow · PhD</text>
  <text x="230" y="205" text-anchor="middle"
        font-family="Courier New,Courier,monospace" font-size="10" fill="#6E6E6E">LLMs under Adversarial Attacks</text>

  <!-- ══════════ RIGHT PANEL ══════════ -->

  <!-- AI news heading -->
  <text x="474" y="45"
        font-family="Courier New,Courier,monospace" font-size="11.5"
        fill="#DA7756" font-weight="bold">AI News</text>
  <text x="474" y="63"
        font-family="Courier New,Courier,monospace" font-size="10.5" fill="#E0E0E0">Granite Embedding Multilingual …</text>
  <text x="474" y="79"
        font-family="Courier New,Courier,monospace" font-size="10.5" fill="#E0E0E0">Unlocking asynchronicity in con…</text>
  <text x="474" y="95"
        font-family="Courier New,Courier,monospace" font-size="10.5" fill="#E0E0E0">Building Blocks for Foundation …</text>
  <text x="474" y="110"
        font-family="Courier New,Courier,monospace" font-size="9.5"
        fill="#6E6E6E" font-style="italic">via huggingface.co/blog</text>

  <!-- trending heading -->
  <text x="474" y="136"
        font-family="Courier New,Courier,monospace" font-size="11.5"
        fill="#DA7756" font-weight="bold">GitHub Trending Today</text>
  <text x="474" y="154"
        font-family="Courier New,Courier,monospace" font-size="10.5" fill="#E0E0E0">★921  yetone/native-feel-skill</text>
  <text x="474" y="170"
        font-family="Courier New,Courier,monospace" font-size="10.5" fill="#E0E0E0">★521  trong776/Roblox-Hub-2026</text>
  <text x="474" y="186"
        font-family="Courier New,Courier,monospace" font-size="10.5" fill="#E0E0E0">★516  S4rdenz/gta-5-mod-menu</text>
  <text x="474" y="203"
        font-family="Courier New,Courier,monospace" font-size="9.5"
        fill="#6E6E6E" font-style="italic">Updated daily · github.com/trending</text>
</svg>